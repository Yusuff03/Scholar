<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Tairac Digital Solution</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --orange: #FF6B00;
      --orange-light: #FF8C3A;
      --blue: #0A3D8F;
      --blue-light: #1A6BC4;
      --dark: #0D1117;
      --dark2: #161B22;
      --glass: rgba(255,255,255,0.05);
      --glass-border: rgba(255,255,255,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1,h2,h3,h4,h5,.navbar-brand { font-family: 'Poppins', sans-serif; }

    /* NAVBAR */
    .navbar {
      background: rgba(13,17,23,0.85) !important;
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
      padding: 14px 0;
    }

    .navbar-brand {
      font-weight: 800;
      font-size: 1.4rem;
      background: linear-gradient(90deg, var(--orange), var(--blue-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* BG BLOBS */
    .auth-bg {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 16px;
      position: relative;
      overflow: hidden;
    }

    .auth-bg::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,0,0.1) 0%, transparent 70%);
      top: -200px; right: -150px;
      pointer-events: none;
    }

    .auth-bg::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(10,61,143,0.15) 0%, transparent 70%);
      bottom: -100px; left: -100px;
      pointer-events: none;
    }

    /* CARD */
    .auth-card {
      background: var(--dark2);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 48px 40px;
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 1;
      animation: fadeInUp 0.7s ease both;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--orange), var(--blue-light));
      border-radius: 28px 28px 0 0;
    }

    .auth-logo {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      background: linear-gradient(90deg, var(--orange), var(--blue-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .auth-card h2 {
      color: #fff;
      font-weight: 800;
      font-size: 1.7rem;
      margin-bottom: 6px;
    }

    .auth-card .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    /* FORM */
    .form-label {
      color: #ccc;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 7px;
    }

    .input-group-custom {
      position: relative;
      margin-bottom: 20px;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      font-size: 1rem;
      z-index: 2;
      pointer-events: none;
    }

    .form-control-custom {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px 16px 14px 44px;
      color: #fff;
      font-size: 0.92rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-control-custom:focus {
      border-color: var(--orange);
      background: rgba(255,107,0,0.05);
      box-shadow: 0 0 0 3px rgba(255,107,0,0.1);
    }

    .form-control-custom::placeholder { color: #555; }

    .toggle-password {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      cursor: pointer;
      font-size: 1rem;
      z-index: 2;
      transition: color 0.2s;
    }

    .toggle-password:hover { color: var(--orange); }

    .forgot-link {
      color: var(--orange);
      font-size: 0.82rem;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .forgot-link:hover { opacity: 0.8; }

    /* BUTTONS */
    .btn-auth {
      width: 100%;
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
      box-shadow: 0 6px 25px rgba(255,107,0,0.35);
      cursor: pointer;
      margin-top: 8px;
    }

    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255,107,0,0.5);
    }

    .btn-auth:active { transform: translateY(0); }

    .btn-auth.loading {
      opacity: 0.8;
      pointer-events: none;
    }

    /* DIVIDER */
    .divider-or {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: #555;
      font-size: 0.82rem;
    }

    .divider-or::before,
    .divider-or::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }

    /* GOOGLE BTN */
    .btn-google {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 13px;
      color: #ccc;
      font-size: 0.92rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-google:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.2);
      color: #fff;
    }

    .google-icon {
      width: 20px; height: 20px;
    }

    /* ALERT */
    .auth-alert {
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.87rem;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .auth-alert.error {
      background: rgba(220,53,69,0.12);
      border: 1px solid rgba(220,53,69,0.3);
      color: #ff6b7a;
      display: flex;
    }

    .auth-alert.success {
      background: rgba(25,135,84,0.12);
      border: 1px solid rgba(25,135,84,0.3);
      color: #5eba85;
      display: flex;
    }

    /* FOOTER TEXT */
    .auth-footer-text {
      text-align: center;
      margin-top: 24px;
      color: #666;
      font-size: 0.88rem;
    }

    .auth-footer-text a {
      color: var(--orange);
      font-weight: 600;
      text-decoration: none;
    }

    .auth-footer-text a:hover { text-decoration: underline; }

    /* ANIMATIONS */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* LIGHT MODE */
    body.light-mode {
      background: #f0f4f8;
      color: #1a1a2e;
    }

    body.light-mode .navbar {
      background: rgba(255,255,255,0.92) !important;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    body.light-mode .auth-card {
      background: #ffffff;
      border-color: rgba(0,0,0,0.08);
      box-shadow: 0 8px 40px rgba(0,0,0,0.1);
    }

    body.light-mode .auth-card h2 { color: #0D1117; }
    body.light-mode .auth-card .subtitle { color: #777; }
    body.light-mode .form-label { color: #444; }

    body.light-mode .form-control-custom {
      background: #f5f7fa;
      border-color: rgba(0,0,0,0.12);
      color: #0D1117;
    }

    body.light-mode .form-control-custom:focus {
      background: #fff;
      border-color: var(--orange);
    }

    body.light-mode .form-control-custom::placeholder { color: #aaa; }
    body.light-mode .input-icon { color: #aaa; }
    body.light-mode .toggle-password { color: #aaa; }

    body.light-mode .divider-or { color: #aaa; }
    body.light-mode .divider-or::before,
    body.light-mode .divider-or::after { background: rgba(0,0,0,0.1); }

    body.light-mode .btn-google {
      background: #f5f7fa;
      border-color: rgba(0,0,0,0.12);
      color: #333;
    }

    body.light-mode .btn-google:hover {
      background: #eee;
      color: #111;
    }

    body.light-mode .auth-footer-text { color: #888; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(var(--orange), var(--blue));
      border-radius: 10px;
    }

    body.light-mode ::-webkit-scrollbar-track { background: #f0f4f8; }

    @media (max-width: 480px) {
      .auth-card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="index.html">Tairac Digital Solution</a>
    <div class="ms-auto d-flex align-items-center gap-2">
      <button id="themeToggle" onclick="toggleTheme()" class="btn" style="background:transparent; border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:#888; padding:7px 12px;">
        <i class="bi bi-moon-fill" id="themeIcon"></i>
      </button>
    </div>
  </div>
</nav>

<div class="auth-bg">
  <div class="auth-card">

    <div class="auth-logo">Tairac Digital Solution</div>
    <h2>Welcome Back 👋</h2>
    <p class="subtitle">Log in to track your CAC registration status</p>

    <div class="auth-alert" id="authAlert">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span id="alertMsg">Invalid email or password.</span>
    </div>

    <div class="mb-1">
      <label class="form-label">Email Address</label>
      <div class="input-group-custom">
        <i class="bi bi-envelope-fill input-icon"></i>
        <input type="email" class="form-control-custom" id="loginEmail" placeholder="you@example.com"/>
      </div>
    </div>

    <div class="mb-1">
      <div class="d-flex justify-content-between align-items-center mb-2 mt-1">
        <label class="form-label mb-0">Password</label>
        <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
      </div>
      <div class="input-group-custom">
        <i class="bi bi-lock-fill input-icon"></i>
        <input type="password" class="form-control-custom" id="loginPassword" placeholder="Enter your password"/>
        <i class="bi bi-eye-fill toggle-password" id="togglePwd" onclick="togglePassword('loginPassword','togglePwd')"></i>
      </div>
    </div>

    <div class="d-flex align-items-center gap-2 mb-2" style="margin-top:-4px">
      <input type="checkbox" id="rememberMe" style="accent-color: var(--orange); width:16px; height:16px; cursor:pointer;"/>
      <label for="rememberMe" style="color:#888; font-size:0.85rem; cursor:pointer;">Remember me</label>
    </div>

    <button class="btn-auth" id="loginBtn" onclick="handleLogin()">
      <i class="bi bi-box-arrow-in-right me-2"></i>Log In
    </button>

    <div id="googleSection">
      <div class="divider-or">or continue with</div>
      <button class="btn-google" onclick="handleGoogleLogin()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <div class="auth-footer-text">
      Don't have an account? <a href="signup.html">Sign Up Free</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL      = 'https://nkehbhhuuqccsnsyiwsg.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rZWhiaGh1dXFjY3Nuc3lpd3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjUzMDUsImV4cCI6MjA5Njk0MTMwNX0.siw8uuFr8FWY5T9UfH0GfbMOjPgGIBfp7kC_ydvyMqs';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── Init: theme + sign out any stale session, then check ──
  (async function init() {
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light-mode');
      const icon = document.getElementById('themeIcon');
      if (icon) icon.className = 'bi bi-sun-fill';
    }

    // ALWAYS sign out first on the login page so no stale admin session persists
    await supabase.auth.signOut();

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') window.handleLogin();
    });
  })();

  // ── Role-based redirect ──
  async function redirectByRole(userId) {
    const { data: profile, error } = await supabase
      .from('profiles')
      .select('role')
      .eq('id', userId)
      .single();

    console.log('Role check:', profile, error);

    if (!error && profile?.role === 'admin') {
      window.location.href = 'admin-dashboard.html';
    } else {
      window.location.href = 'user-dashboard.html';
    }
  }

  // ── Login ──
  window.handleLogin = async function () {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    hideAlert();

    if (!email || !password) { showAlert('Please fill in all fields.', 'error'); return; }
    setLoading(true);

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      setLoading(false);
      const m = error.message.toLowerCase();
      if (m.includes('invalid') || m.includes('credentials') || m.includes('password')) {
        showAlert('Invalid email or password.', 'error');
      } else if (m.includes('too many')) {
        showAlert('Too many attempts. Wait a few minutes.', 'error');
      } else if (m.includes('email not confirmed')) {
        showAlert('Please confirm your email first.', 'error');
      } else {
        showAlert('Login failed: ' + error.message, 'error');
      }
      return;
    }

    showAlert('Login successful! Redirecting...', 'success');
    await redirectByRole(data.user.id);
  };

  // ── Google ──
  window.handleGoogleLogin = async function () {
    hideAlert();
    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/user-dashboard.html' }
    });
    if (error) showAlert('Google sign-in failed.', 'error');
  };

  // ── UI ──
  window.togglePassword = function (inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    input.type  = input.type === 'password' ? 'text' : 'password';
    icon.className = input.type === 'password' ? 'bi bi-eye-fill toggle-password' : 'bi bi-eye-slash-fill toggle-password';
  };

  window.toggleTheme = function () {
    document.body.classList.toggle('light-mode');
    const isLight = document.body.classList.contains('light-mode');
    document.getElementById('themeIcon').className = isLight ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
  };

  function showAlert(msg, type = 'error') {
    const el = document.getElementById('authAlert');
    el.className = 'auth-alert ' + type;
    document.getElementById('alertMsg').textContent = msg;
  }
  function hideAlert() { document.getElementById('authAlert').className = 'auth-alert'; }
  function setLoading(on) {
    const btn = document.getElementById('loginBtn');
    btn.classList.toggle('loading', on);
    btn.innerHTML = on ? '<i class="bi bi-arrow-repeat me-2"></i>Logging in...' : '<i class="bi bi-box-arrow-in-right me-2"></i>Log In';
  }
</script>
</body>
</html>
