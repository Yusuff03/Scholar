<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — Tairac Digital Solution</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --orange: #FF6B00;
      --orange-light: #FF8C3A;
      --blue: #0A3D8F;
      --blue-light: #1A6BC4;
      --dark: #0D1117;
      --dark2: #161B22;
      --glass: rgba(255,255,255,0.05);
      --glass-border: rgba(255,255,255,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1,h2,h3,h4,h5,.navbar-brand { font-family: 'Poppins', sans-serif; }

    .navbar {
      background: rgba(13,17,23,0.85) !important;
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
      padding: 14px 0;
    }

    .navbar-brand {
      font-weight: 800;
      font-size: 1.4rem;
      background: linear-gradient(90deg, var(--orange), var(--blue-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-bg {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 16px;
      position: relative;
      overflow: hidden;
    }

    .auth-bg::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(10,61,143,0.15) 0%, transparent 70%);
      top: -200px; left: -150px;
      pointer-events: none;
    }

    .auth-bg::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,0,0.1) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      pointer-events: none;
    }

    .auth-card {
      background: var(--dark2);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 48px 40px;
      width: 100%;
      max-width: 500px;
      position: relative;
      z-index: 1;
      animation: fadeInUp 0.7s ease both;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--blue-light), var(--orange));
      border-radius: 28px 28px 0 0;
    }

    .auth-logo {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      background: linear-gradient(90deg, var(--orange), var(--blue-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .auth-card h2 {
      color: #fff;
      font-weight: 800;
      font-size: 1.7rem;
      margin-bottom: 6px;
    }

    .auth-card .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .form-label {
      color: #ccc;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 7px;
    }

    .input-group-custom { position: relative; margin-bottom: 18px; }

    .input-icon {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      color: #666;
      font-size: 1rem;
      z-index: 2;
      pointer-events: none;
    }

    .form-control-custom {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px 16px 14px 44px;
      color: #fff;
      font-size: 0.92rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-control-custom:focus {
      border-color: var(--blue-light);
      background: rgba(26,107,196,0.05);
      box-shadow: 0 0 0 3px rgba(26,107,196,0.1);
    }

    .form-control-custom::placeholder { color: #555; }

    .toggle-password {
      position: absolute;
      right: 16px; top: 50%;
      transform: translateY(-50%);
      color: #666;
      cursor: pointer;
      font-size: 1rem;
      z-index: 2;
      transition: color 0.2s;
    }

    .toggle-password:hover { color: var(--blue-light); }

    .strength-bar { display: flex; gap: 4px; margin-top: 8px; margin-bottom: 4px; }
    .strength-bar span {
      flex: 1; height: 4px; border-radius: 4px;
      background: rgba(255,255,255,0.08); transition: background 0.3s;
    }

    .strength-text { font-size: 0.78rem; color: #666; margin-bottom: 4px; }

    .terms-check {
      display: flex; align-items: flex-start;
      gap: 10px; margin: 8px 0 16px;
    }

    .terms-check input {
      accent-color: var(--orange);
      width: 16px; height: 16px;
      margin-top: 2px; flex-shrink: 0; cursor: pointer;
    }

    .terms-check label {
      color: #888; font-size: 0.84rem; line-height: 1.5; cursor: pointer;
    }

    .terms-check label a { color: var(--orange); text-decoration: none; font-weight: 600; }

    .btn-auth {
      width: 100%;
      background: linear-gradient(135deg, var(--blue), var(--blue-light));
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
      box-shadow: 0 6px 25px rgba(10,61,143,0.4);
      cursor: pointer;
      margin-top: 4px;
    }

    .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(10,61,143,0.55); }
    .btn-auth.loading { opacity: 0.8; pointer-events: none; }

    .divider-or {
      display: flex; align-items: center;
      gap: 12px; margin: 24px 0;
      color: #555; font-size: 0.82rem;
    }

    .divider-or::before, .divider-or::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(255,255,255,0.07);
    }

    .btn-google {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 13px;
      color: #ccc; font-size: 0.92rem; font-weight: 600;
      font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center;
      gap: 10px; cursor: pointer; transition: all 0.3s ease;
    }

    .btn-google:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); color: #fff; }
    .google-icon { width: 20px; height: 20px; }

    .auth-alert {
      border-radius: 12px; padding: 12px 16px;
      font-size: 0.87rem; margin-bottom: 20px;
      display: none; align-items: center; gap: 10px;
    }

    .auth-alert.error   { background: rgba(220,53,69,0.12);  border: 1px solid rgba(220,53,69,0.3);  color: #ff6b7a; display: flex; }
    .auth-alert.success { background: rgba(25,135,84,0.12);  border: 1px solid rgba(25,135,84,0.3);  color: #5eba85; display: flex; }
    .auth-alert.info    { background: rgba(26,107,196,0.12); border: 1px solid rgba(26,107,196,0.3); color: var(--blue-light); display: flex; }

    .auth-footer-text {
      text-align: center; margin-top: 24px;
      color: #666; font-size: 0.88rem;
    }

    .auth-footer-text a { color: var(--orange); font-weight: 600; text-decoration: none; }
    .auth-footer-text a:hover { text-decoration: underline; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* LIGHT MODE */
    body.light-mode { background: #f0f4f8; color: #1a1a2e; }
    body.light-mode .navbar { background: rgba(255,255,255,0.92) !important; border-bottom: 1px solid rgba(0,0,0,0.08); }
    body.light-mode .auth-card { background: #ffffff; border-color: rgba(0,0,0,0.08); box-shadow: 0 8px 40px rgba(0,0,0,0.1); }
    body.light-mode .auth-card h2 { color: #0D1117; }
    body.light-mode .auth-card .subtitle { color: #777; }
    body.light-mode .form-label { color: #444; }
    body.light-mode .form-control-custom { background: #f5f7fa; border-color: rgba(0,0,0,0.12); color: #0D1117; }
    body.light-mode .form-control-custom:focus { background: #fff; border-color: var(--blue-light); }
    body.light-mode .form-control-custom::placeholder { color: #aaa; }
    body.light-mode .input-icon { color: #aaa; }
    body.light-mode .toggle-password { color: #aaa; }
    body.light-mode .divider-or { color: #aaa; }
    body.light-mode .divider-or::before, body.light-mode .divider-or::after { background: rgba(0,0,0,0.1); }
    body.light-mode .btn-google { background: #f5f7fa; border-color: rgba(0,0,0,0.12); color: #333; }
    body.light-mode .btn-google:hover { background: #eee; color: #111; }
    body.light-mode .terms-check label { color: #666; }
    body.light-mode .strength-text { color: #999; }
    body.light-mode .auth-footer-text { color: #888; }
    body.light-mode .strength-bar span { background: rgba(0,0,0,0.1); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: linear-gradient(var(--orange), var(--blue)); border-radius: 10px; }
    body.light-mode ::-webkit-scrollbar-track { background: #f0f4f8; }

    @media (max-width: 480px) { .auth-card { padding: 36px 24px; } }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="index.html">Tairac Digital Solution</a>
    <div class="ms-auto d-flex align-items-center gap-2">
      <button id="themeToggle" onclick="toggleTheme()" class="btn" style="background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#888;padding:7px 12px;">
        <i class="bi bi-moon-fill" id="themeIcon"></i>
      </button>
    </div>
  </div>
</nav>

<div class="auth-bg">
  <div class="auth-card">

    <div class="auth-logo">Tairac Digital Solution</div>
    <h2>Create Account 🚀</h2>
    <p class="subtitle">Join hundreds of registered Nigerian businesses</p>

    <div class="auth-alert" id="authAlert">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span id="alertMsg">Something went wrong.</span>
    </div>

    <div class="mb-1">
      <label class="form-label">Full Name</label>
      <div class="input-group-custom">
        <i class="bi bi-person-fill input-icon"></i>
        <input type="text" class="form-control-custom" id="signupName" placeholder="Your full name"/>
      </div>
    </div>

    <div class="mb-1">
      <label class="form-label">Phone Number</label>
      <div class="input-group-custom">
        <i class="bi bi-telephone-fill input-icon"></i>
        <input type="tel" class="form-control-custom" id="signupPhone" placeholder="+234 800 000 0000"/>
      </div>
    </div>

    <div class="mb-1">
      <label class="form-label">Email Address</label>
      <div class="input-group-custom">
        <i class="bi bi-envelope-fill input-icon"></i>
        <input type="email" class="form-control-custom" id="signupEmail" placeholder="you@example.com"/>
      </div>
    </div>

    <div class="mb-1">
      <label class="form-label">Password</label>
      <div class="input-group-custom" style="margin-bottom:6px">
        <i class="bi bi-lock-fill input-icon"></i>
        <input type="password" class="form-control-custom" id="signupPassword" placeholder="Create a strong password" oninput="checkStrength(this.value)"/>
        <i class="bi bi-eye-fill toggle-password" id="togglePwd1" onclick="togglePassword('signupPassword','togglePwd1')"></i>
      </div>
      <div class="strength-bar">
        <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
      </div>
      <div class="strength-text" id="strengthText">Enter a password</div>
    </div>

    <div class="mb-1">
      <label class="form-label">Confirm Password</label>
      <div class="input-group-custom">
        <i class="bi bi-lock-fill input-icon"></i>
        <input type="password" class="form-control-custom" id="signupConfirm" placeholder="Repeat your password"/>
        <i class="bi bi-eye-fill toggle-password" id="togglePwd2" onclick="togglePassword('signupConfirm','togglePwd2')"></i>
      </div>
    </div>

    <div class="terms-check">
      <input type="checkbox" id="termsCheck"/>
      <label for="termsCheck">
        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>. I understand my data will be used for CAC registration services.
      </label>
    </div>

    <button class="btn-auth" id="signupBtn" onclick="handleSignup()">
      <i class="bi bi-person-plus-fill me-2"></i>Create My Account
    </button>

    <div>
      <div class="divider-or">or continue with</div>
      <button class="btn-google" onclick="handleGoogleSignup()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <div class="auth-footer-text">
      Already have an account? <a href="login.html">Log In</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ===== SUPABASE SIGNUP ===== -->
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL      = 'https://nkehbhhuuqccsnsyiwsg.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rZWhiaGh1dXFjY3Nuc3lpd3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjUzMDUsImV4cCI6MjA5Njk0MTMwNX0.siw8uuFr8FWY5T9UfH0GfbMOjPgGIBfp7kC_ydvyMqs';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── If already logged in, redirect to dashboard ──
  (async function init() {
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light-mode');
      const icon = document.getElementById('themeIcon');
      if (icon) icon.className = 'bi bi-sun-fill';
    }

    const { data: { session } } = await supabase.auth.getSession();
    if (session) { window.location.href = 'user-dashboard.html'; }
  })();

  // ── Email/Password Signup ──
  window.handleSignup = async function () {
    const name     = document.getElementById('signupName').value.trim();
    const phone    = document.getElementById('signupPhone').value.trim();
    const email    = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm  = document.getElementById('signupConfirm').value;
    const terms    = document.getElementById('termsCheck').checked;

    hideAlert();

    // Validation
    if (!name || !phone || !email || !password || !confirm) {
      showAlert('Please fill in all fields.', 'error'); return;
    }
    if (password !== confirm) {
      showAlert('Passwords do not match.', 'error'); return;
    }
    if (password.length < 8) {
      showAlert('Password must be at least 8 characters.', 'error'); return;
    }
    if (!terms) {
      showAlert('Please accept the Terms of Service to continue.', 'error'); return;
    }

    setLoading(true);

    // 1️⃣ Create auth user in Supabase
    const { data: authData, error: authError } = await supabase.auth.signUp({
      email,
      password,
      options: {
        data: { full_name: name, phone }   // stored in auth.users metadata
      }
    });

    if (authError) {
      setLoading(false);
      if (authError.message.includes('already registered') || authError.message.includes('already been registered')) {
        showAlert('This email is already registered. Please log in instead.', 'error');
      } else {
        showAlert(authError.message || 'Signup failed. Please try again.', 'error');
      }
      return;
    }

    // 2️⃣ Insert profile row into profiles table
    // (Your RLS should allow insert when auth.uid() = id)
    const { error: profileError } = await supabase
      .from('profiles')
      .upsert({
        id:         authData.user.id,
        full_name:  name,
        phone:      phone,
        email:      email,
        role:       'user',              // default role — admin must be set manually
        created_at: new Date().toISOString()
      });

    if (profileError) {
      console.error('Profile insert error:', profileError.message);
      // Non-fatal — auth user created; profile will be created on next login via trigger
    }

    setLoading(false);

    // 3️⃣ Check if email confirmation is required
    if (authData.session) {
      // Email confirmation disabled — logged in immediately
      showAlert('Account created successfully! Redirecting...', 'success');
      setTimeout(() => { window.location.href = 'user-dashboard.html'; }, 1200);
    } else {
      // Email confirmation enabled — tell user to check inbox
      showAlert('Account created! Please check your email to confirm your account, then log in.', 'info');
      document.getElementById('signupBtn').innerHTML = '<i class="bi bi-envelope-check-fill me-2"></i>Check Your Email';
    }
  };

  // ── Google Signup ──
  window.handleGoogleSignup = async function () {
    hideAlert();

    const { data, error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + '/user-dashboard.html'
      }
    });

    if (error) {
      showAlert('Google sign-in failed. Please try again.', 'error');
      console.error('Google OAuth error:', error.message);
    }
    // Supabase handles the redirect automatically
    // Profile row will be created by a Supabase DB trigger (see note below)
  };

  // ── UI Helpers ──
  window.togglePassword = function (inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'bi bi-eye-slash-fill toggle-password';
    } else {
      input.type = 'password';
      icon.className = 'bi bi-eye-fill toggle-password';
    }
  };

  window.checkStrength = function (val) {
    const bars = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
    const text = document.getElementById('strengthText');
    let score = 0;
    if (val.length >= 8)           score++;
    if (/[A-Z]/.test(val))         score++;
    if (/[0-9]/.test(val))         score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
    const labels = ['Weak','Fair','Good','Strong'];
    bars.forEach((b, i) => {
      b.style.background = i < score ? colors[score - 1] : 'rgba(255,255,255,0.08)';
    });
    text.textContent = val.length === 0 ? 'Enter a password' : (labels[score - 1] || 'Weak');
    text.style.color  = val.length === 0 ? '#666' : colors[score - 1];
  };

  window.toggleTheme = function () {
    document.body.classList.toggle('light-mode');
    const isLight = document.body.classList.contains('light-mode');
    document.getElementById('themeIcon').className = isLight ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
  };

  function showAlert(msg, type = 'error') {
    const el = document.getElementById('authAlert');
    el.className = 'auth-alert ' + type;
    document.getElementById('alertMsg').textContent = msg;
  }

  function hideAlert() { document.getElementById('authAlert').className = 'auth-alert'; }

  function setLoading(on) {
    const btn = document.getElementById('signupBtn');
    if (on) {
      btn.classList.add('loading');
      btn.innerHTML = '<i class="bi bi-arrow-repeat me-2"></i>Creating account...';
    } else {
      btn.classList.remove('loading');
      btn.innerHTML = '<i class="bi bi-person-plus-fill me-2"></i>Create My Account';
    }
  }
</script>
</body>
</html>
